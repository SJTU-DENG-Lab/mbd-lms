# LLaDA2-mini Code MultiTF CE (block_size=32, buffer_size=2)
model:
  config_path: mbd_lm/configs/model_configs/llada2_mini
  model_path: ckpts/inclusionAI/LLaDA2.0-mini-merged
  tokenizer_path: ckpts/inclusionAI/LLaDA2.0-mini-merged
  attn_implementation: flex_attention
  moe_implementation: fused
data:
  train_path: dataset/llada2_code_multi_tf_60k_oput.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_dict:
    low_min: 0.001
    low_max: 0.3
    high_min: 0.5
    high_max: 1.0
  num_workers: 16
  buffer_size: 2
  noise_transition_margin_ratio: 0.01
  noise_transition_gamma: 2.0
  buffer_internal_ramp: chain_uniform
  noise_schedule_mode: buffer_ramp
  coverage_enable: true
  coverage_mode: full
  coverage_random_n: 0
train:
  output_dir: mbd_lm/multibd_ckpt/llada2_multi_tf_code_b32
  data_parallel_mode: fsdp2
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 32
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-5
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.1
  max_grad_norm: 1.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: true
  enable_full_shard: true
  enable_fsdp_offload: true
  enable_activation_offload: false
  init_device: meta
  broadcast_model_weights_from_rank0: true
  enable_full_determinism: false
  empty_cache_steps: 500
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_epochs: 1
  save_steps: 500
  save_hf_weights: true
  dual_bd_mode: true
  block_size: 32
  same_token_labels: true
  use_distill: false
  ce_weight: 1.0
  kl_weight: 0.0
  wandb_online: false
  use_wandb: true
  wandb_project: MBD-LM
  wandb_name: llada2_multi_tf_code_b32
  log_steps: 10
  early_stopping_enabled: false
  early_stopping_min_steps: 200
  early_stopping_patience: 30
  early_stopping_rise_ratio: 0.08
  early_stopping_rise_window: 50
  early_stopping_stagnation_steps: 40
  early_stopping_stagnation_tol_ratio: 0.002
